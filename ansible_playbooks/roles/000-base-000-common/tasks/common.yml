---
# 增加虚拟机到k8s pod的路由，其网段及k8s的worker主机要根据实际情况改。
- name: add route to k8s pod
  shell: |
    route add -net {{ k8s_pod_network }} netmask {{ k8s_pod_netmask }} gw {{ k8s_master01_ip }}

- name: modify PS1
  blockinfile:
    path: /etc/profile
    block: |
      if [ $UID -eq 0 ]; then
          export PS1="[\u@\H \[\e[34m\]\w\[\e[m\] \[\e[33m\]\A\[\e[m\]]# \#> "
      else
          export PS1="[\u@\H \[\e[34m\]\w\[\e[m\] \[\e[33m\]\A\[\e[m\]]$ \#> "
      fi

- name: disable iptables
  shell: iptables -F && iptables --list -n
  register: disable_iptables

- name: show disable iptables
  debug: var=disable_iptables.stdout_lines verbosity=0

- name: disable firewalld
  service:
    name: firewalld
    state: stopped
    enabled: no

- name: disable selinux
  selinux:
    state: disabled

- name: copy vimrc
  copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
  with_items:
    - { src: vimrc, dest: /root/.vimrc }

- block:
  - name: disable swap in /etc/fstab
    replace:
      path: /etc/fstab
      regexp: '(^/dev/mapper/centos-swap.*)'
      replace: '#\1'

  - name: disable swap
    shell: swapoff -a

  when: is_k8s_host
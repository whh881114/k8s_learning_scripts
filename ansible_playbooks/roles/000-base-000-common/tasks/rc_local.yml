---
- name: set transparent_hugepage to enabled
  shell: echo never > /sys/kernel/mm/transparent_hugepage/enabled

- name: create rc_common.local file
  file:
    path: "{{ rc_local_file }}"
    state: touch
    owner: root
    group: root
    mode: 0755

- name: set transparent_hugepage to enabled at the system boot
  lineinfile:
    path: "{{ rc_local_file }}"
    state: present
    line: 'echo never > /sys/kernel/mm/transparent_hugepage/enabled'

- name: add k8s route items to rc_common.local file
  blockinfile:
    path: "{{ rc_local_file }}"
    block: |
      route add -net 10.244.1.0 netmask 255.255.255.0 gw {{ k8s_worker01_ip }}
      route add -net 10.244.2.0 netmask 255.255.255.0 gw {{ k8s_worker02_ip }}
      route add -net 10.244.3.0 netmask 255.255.255.0 gw {{ k8s_worker03_ip }}
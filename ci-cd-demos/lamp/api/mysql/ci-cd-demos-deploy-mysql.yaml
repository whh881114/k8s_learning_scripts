apiVersion: apps/v1
kind: Deployment
metadata:
  name: lamp-mysql
  namespace: ci-cd-demos
  labels:
    name: lamp-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      name: lamp-mysql
  template:
    metadata:
      labels:
        name: lamp-mysql
    spec:
      containers:
        - name: lamp-mysql
          image: registry.k8s.example.com:5000/docker.io/mysql:5.7.29
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: lamp-mysql-vars
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: lamp-mysql-vars
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: lamp-mysql-vars
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: lamp-mysql-vars
                  key: MYSQL_PASSWORD
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: logs
              mountPath: /data
            - name: conf
              mountPath: /etc/mysql/conf.d
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: lamp-mysql-data
        - name: logs
          persistentVolumeClaim:
            claimName: lamp-mysql-logs
        - name: conf
          configMap:
            name: lamp-mysql-conf
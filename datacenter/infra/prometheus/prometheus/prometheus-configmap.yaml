# Prometheus configuration format https://prometheus.io/docs/prometheus/latest/configuration/configuration/
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: prometheus
  labels:
    kubernetes.io/cluster-service: "true"
    addonmanager.kubernetes.io/mode: EnsureExists
data:
  prometheus.yml: |
    global:
      evaluation_interval: 15s
      scrape_interval: 15s
      scrape_timeout: 10s
      external_labels:
        environment: prometheus.ingress-nginx.freedom.org

    rule_files:
      - /data/rules/*.rules

    alerting:
      alertmanagers:
        - path_prefix: alertmanager/
          scheme: http
          static_configs:
            - targets:
              - alertmanager:9093

    scrape_configs:
      # 系统组件配置
      - job_name: prometheus
        metrics_path: /metrics
        static_configs:
          - targets:
            - prometheus:9090

      - job_name: alertmanager
        static_configs:
          - targets:
            - alertmanager:9093

      - job_name: pushgateway
        static_configs:
          - targets:
            - pushgateway:9091

      # consul自动发现配置
      - job_name: consul_sd_node_exporter
        consul_sd_configs:
          - server: http://consul.ingress-nginx.freedom.org
            services:
              - node-exporter
        relabel_configs:
          - source_labels:
              - __meta_consul_node
            target_label: hostname

      # k8s自动发现配置：
      # https://github.com/prometheus/prometheus/blob/release-2.25/documentation/examples/prometheus-kubernetes.yml
      # https://blog.51cto.com/u_14143894/2438026
      - job_name: kubernetes-apiservers
        kubernetes_sd_configs:
        - role: endpoints
        relabel_configs:
        - action: keep
          regex: default;kubernetes;https
          source_labels:
          - __meta_kubernetes_namespace
          - __meta_kubernetes_service_name
          - __meta_kubernetes_endpoint_port_name
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

      - job_name: kubernetes-nodes-kubelet
        kubernetes_sd_configs:
        - role: node
        relabel_configs:
        - action: labelmap
          regex: __meta_kubernetes_node_label_(.+)
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

      - job_name: kubernetes-nodes-cadvisor
        kubernetes_sd_configs:
        - role: node
        relabel_configs:
        - action: labelmap
          regex: __meta_kubernetes_node_label_(.+)
        - target_label: __metrics_path__
          replacement: /metrics/cadvisor
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
# Prometheus configuration format https://prometheus.io/docs/prometheus/latest/configuration/configuration/
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: prometheus
  labels:
    kubernetes.io/cluster-service: "true"
    addonmanager.kubernetes.io/mode: EnsureExists
data:
  prometheus.yml: |
    global:
      evaluation_interval: 15s
      scrape_interval: 15s
      scrape_timeout: 10s
      external_labels:
        environment: prometheus.ingress-nginx.freedom.org

    rule_files:
      - /data/rules/*.rules

    alerting:
      alertmanagers:
        - path_prefix: alertmanager/
          scheme: http
          static_configs:
            - targets:
              - alertmanager:9093

    scrape_configs:
      - job_name: prometheus
        metrics_path: /metrics
        static_configs:
          - targets:
            - prometheus:9090

      - job_name: alertmanager
        static_configs:
          - targets:
            - alertmanager:9093

      - job_name: pushgateway
        static_configs:
          - targets:
            - pushgateway:9091

      - job_name: "kube-state-metrics"
        static_configs:
          - targets:
            - kube-state-metrics.prometheus:8080
            - kube-state-metrics.prometheus:8081

      - job_name: 'kubernetes-nodes'
        static_configs:
          - targets:
            - master01.k8s.freedom.org:9100
            - master02.k8s.freedom.org:9100
            - master03.k8s.freedom.org:9100
            - worker01.k8s.freedom.org:9100
            - worker02.k8s.freedom.org:9100
            - worker03.k8s.freedom.org:9100

      - job_name: consul_sd_node_exporter
        consul_sd_configs:
          - server: http://consul.ingress-nginx.freedom.org
            services:
              - node-exporter
        relabel_configs:
          - source_labels:
              - __meta_consul_node
            target_label: hostname
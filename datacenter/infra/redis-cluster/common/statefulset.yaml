---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-cluster-common
  namespace: redis-cluster
spec:
  serviceName: redis-cluster-common
  replicas: 6
  selector:
    matchLabels:
      app: redis-cluster-common
  template:
    metadata:
      labels:
        app: redis-cluster-common
    spec:
      initContainers:
        - name: sysctl
          image: harbor.freedom.org/docker.io/busybox:1.31.1
          command: ["sysctl"]
          args: ["-w", "net.core.somaxconn=65535"]
          securityContext:
            privileged: true
        - name: disable-transparent-hugepage
          image: harbor.freedom.org/docker.io/busybox:1.31.1
          command: ["sh", "-c", "echo never > /host-sys/kernel/mm/transparent_hugepage/enabled"]
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-sys
              mountPath: /host-sys
      containers:
        - name: redis-cluster-common
          image: harbor.freedom.org/docker.io/redis:5.0.7
          ports:
            - containerPort: 6379
              name: client
            - containerPort: 16379
              name: gossip
          command: ["/conf/update_node.sh", "redis-server", "/conf/redis.conf"]
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          volumeMounts:
            - name: conf
              mountPath: /conf
              readOnly: false
            - name: data
              mountPath: /data
              readOnly: false
          resources:
            limits:
              cpu: 500m
              memory: 1024Mi
            requests:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: conf
          configMap:
            name: redis-cluster-common
            defaultMode: 0755
        - name: host-sys
          hostPath:
            path: /sys
  volumeClaimTemplates:
    - metadata:
        name: data
        annotations:
          volume.beta.kubernetes.io/storage-class: nfs-redis
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
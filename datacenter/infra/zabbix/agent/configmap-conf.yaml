---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zabbix-agent-conf
  namespace: zabbix
data:
  disk_status.conf: |
    UserParameter=disk.discovery[*],sh /etc/zabbix/scripts/disk_discovery.sh
    UserParameter=disk.status[*],sh /etc/zabbix/scripts/disk_status.sh $1 $2

  tcp_status.conf: |
    UserParameter=tcp.status[*],sh /etc/zabbix/scripts/tcp_status.sh $1
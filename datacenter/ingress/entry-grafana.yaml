apiVersion: extensions/v1beta1
kind: Ingress
metadata:
  name: grafana
  namespace: grafana
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
    - host: grafana.ingress-nginx.freedom.org
      http:
        paths:
        - path: /
          backend:
            serviceName: grafana
            servicePort: 3000
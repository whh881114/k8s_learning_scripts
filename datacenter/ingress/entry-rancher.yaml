apiVersion: extensions/v1beta1
kind: Ingress
metadata:
  name: rancher
  namespace: cattle-system
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
    - host: rancher.k8s.freedom.org
      http:
        paths:
        - path: /
          backend:
            serviceName: rancher-http
            servicePort: 80
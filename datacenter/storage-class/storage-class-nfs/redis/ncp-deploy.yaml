kind: Deployment
apiVersion: apps/v1
metadata:
  name: nfs-redis
  namespace: storage-class
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nfs-redis
  template:
    metadata:
      labels:
        app: nfs-redis
    spec:
      serviceAccountName: nfs-redis
      containers:
        - name: nfs-redis
          image: harbor.freedom.org/quay.io/external_storage/nfs-client-provisioner:v3.1.0-k8s1.11
          volumeMounts:
            - name: nfs-client-root
              mountPath: /persistentvolumes
          env:
            - name: PROVISIONER_NAME
              value: fuseim.pri/nfs-redis
            - name: NFS_SERVER
              value: nfs.freedom.org
            - name: NFS_PATH
              value: /data/k8s-nfs-pvc/redis
      volumes:
        - name: nfs-client-root
          nfs:
            server: nfs.freedom.org
            path: /data/k8s-nfs-pvc/redis

kind: Deployment
apiVersion: apps/v1
metadata:
  name: dev-public-infra
  namespace: storage-class-nfs
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dev-public-infra
  template:
    metadata:
      labels:
        app: dev-public-infra
    spec:
      serviceAccountName: dev-public-infra
      containers:
        - name: dev-public-infra
          image: registry.freedom.org/quay.io/external_storage/nfs-client-provisioner:v3.1.0-k8s1.11
          volumeMounts:
            - name: nfs-client-root
              mountPath: /persistentvolumes
          env:
            - name: PROVISIONER_NAME
              value: fuseim.pri/ifs-public-infra
            - name: NFS_SERVER
              value: nfs.freedom.org
            - name: NFS_PATH
              value: /data01/k8s-nfs-pvc/dev-public-infra
      volumes:
        - name: nfs-client-root
          nfs:
            server: nfs.freedom.org
            path: /data01/k8s_nfs_pvc/dev-public-infra

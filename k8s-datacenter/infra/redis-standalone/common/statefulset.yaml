---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-standalone-common
  namespace: redis-standalone
  labels:
    name: redis-standalone-common
spec:
  serviceName: redis-standalone-common
  replicas: 1
  selector:
    matchLabels:
      name: redis-standalone-common
  template:
    metadata:
      labels:
        name: redis-standalone-common
    spec:
      initContainers:
        - name: sysctl
          image: harbor.freedom.org/docker.io/busybox:1.31.1
          command: ["sysctl"]
          args: ["-w", "net.core.somaxconn=65535"]
          securityContext:
            privileged: true
        - name: disable-transparent-hugepage
          image: harbor.freedom.org/docker.io/busybox:1.31.1
          command: ["sh", "-c", "echo never > /host-sys/kernel/mm/transparent_hugepage/enabled"]
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-sys
              mountPath: /host-sys
      containers:
        - name: redis-standalone-common
          image: harbor.freedom.org/docker.io/redis:5.0.7
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 2048Mi
          command: ["redis-server"]
          args: ["/usr/local/etc/redis/redis.conf"] # 配置文件中的daemon值要设置为no。
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
            - name: conf
              mountPath: /usr/local/etc/redis/
              readOnly: true
      volumes:
        - name: conf
          configMap:
            name: redis-standalone-common
        - name: host-sys
          hostPath:
            path: /sys
  volumeClaimTemplates:
    - metadata:
        name: data
        annotations:
          volume.beta.kubernetes.io/storage-class: nfs-infra
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
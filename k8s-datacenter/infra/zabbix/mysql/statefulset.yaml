apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zabbix-mysql
  namespace: production-zabbix
  labels:
    name: zabbix-mysql
spec:
  serviceName: zabbix-mysql
  replicas: 1
  selector:
    matchLabels:
      name: zabbix-mysql
  template:
    metadata:
      labels:
        name: zabbix-mysql
    spec:
      containers:
        - name: mysql
          image: harbor.freedom.org/docker.io/mysql:5.7.29
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: zabbix-mysql-vars
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: zabbix-mysql-vars
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: zabbix-mysql-vars
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: zabbix-mysql-vars
                  key: MYSQL_PASSWORD
          ports:
            - containerPort: 3306
          resources:
            limits:
              cpu: 1000m
              memory: 2048Mi
            requests:
              cpu: 500m
              memory: 1024Mi
          volumeMounts:
            - name: zabbix-mysql-data
              mountPath: /var/lib/mysql
            - name: zabbix-mysql-logs
              mountPath: /data
            - name: zabbix-mysql-conf
              mountPath: /etc/mysql/conf.d
              readOnly: true
      volumes:
        - name: zabbix-mysql-conf
          configMap:
            name: zabbix-mysql-conf
  volumeClaimTemplates:
    - metadata:
        name: zabbix-mysql-data
        annotations:
          volume.beta.kubernetes.io/storage-class: nfs-client-provisioner-common
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
    - metadata:
        name: zabbix-mysql-logs
        annotations:
          volume.beta.kubernetes.io/storage-class: nfs-client-provisioner-common
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
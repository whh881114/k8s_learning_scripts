---
kind: ServiceAccount
apiVersion: v1
metadata:
  name: elasticsearch-master
  namespace: production-infra
  labels:
    app: elasticsearch-master


---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: elasticsearch-master
  namespace: production-infra
  labels:
    app: elasticsearch-master
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: elasticsearch-master
subjects:
  - kind: ServiceAccount
    name: elasticsearch-master
    namespace: production-infra


---
kind: StatefulSet
apiVersion: apps/v1
metadata:
  name: elasticsearch-master
  namespace: production-infra
  labels:
    component: elasticsearch
    role: master
spec:
  replicas: 3
  selector:
    matchLabels:
      component: elasticsearch
      role: master
  template:
    serviceName: elasticsearch-master
    metadata:
      labels:
        component: elasticsearch
        role: master
    spec:
      serviceAccountName: elasticsearch-master
      initContainers:
        - name: init-sysctl
          image: harbor.freedom.org/docker.io/busybox:1.31.1
          command:
            - sysctl
            - -w
            - vm.max_map_count=262144
          securityContext:
            privileged: true
      containers:
        - name: elasticsearch-master
          image: harbor.freedom.org/elastic/elasticsearch:7.9.2
          imagePullPolicy: IfNotPresent
          env:
            - name: "ES_JAVA_OPTS"
              value: "-Xms512m -Xmx512m"
            - name: "cluster.name"
              value: "production-infra-elasticsearch"
            - name: "discovery.seed_hosts"
              value: "elasticsearch-master"
#            - name: "discovery.seed_providers"
#              value: "elasticsearch-master"
            - name: "cluster.initial_master_nodes"
              value: "elasticsearch-master"
            - name: "node.master"
              value: "true"
            - name: "node.data"
              value: "false"
            - name: "node.ingest"
              value: "false"
            - name: "node.ml"
              value: "false"
            - name: "node.remote_cluster_client"  # 各个角色介绍：https://www.elastic.co/guide/en/elasticsearch/reference/current/modules-node.html
              value: "false"
          resources:
            limits:
              cpu: 1000m
              memory: 4096Mi
            requests:
              cpu: 100m
              memory: 1024Mi
          ports:
            - containerPort: 9300
              name: transport
              protocol: TCP
          volumeMounts:
            - name: storage
              mountPath: /data
      volumes:
        - name: "storage"
          emptyDir:
            medium: ""


---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-master
  namespace: production-infra
  labels:
    component: elasticsearch
    role: master
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    component: elasticsearch
    role: master
  ports:
    - name: transport
      port: 9300
      protocol: TCP

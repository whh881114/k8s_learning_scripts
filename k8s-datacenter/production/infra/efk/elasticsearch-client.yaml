---
kind: ServiceAccount
apiVersion: v1
metadata:
  name: elasticsearch-client
  namespace: production-infra
  labels:
    app: elasticsearch-client


---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: elasticsearch-client
  namespace: production-infra
  labels:
    app: elasticsearch-client
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: elasticsearch-client
subjects:
  - kind: ServiceAccount
    name: elasticsearch-client
    namespace: production-infra


---
kind: Service
apiVersion: v1
metadata:
  name: elasticsearch-client
  namespace: production-infra
  labels:
    component: elasticsearch
    role: client
spec:
  type: ClusterIP
  selector:
    component: elasticsearch
    role: client
  ports:
    - name: data
      port: 9200
      protocol: TCP


---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: elasticsearch-client
  namespace: production-infra
  labels:
    component: elasticsearch
    role: client
spec:
  replicas: 1
  selector:
    matchLabels:
      component: elasticsearch
      role: client
  template:
    metadata:
      labels:
        component: elasticsearch
        role: client
    spec:
      serviceAccountName: elasticsearch-master
      initContainers:
      - name: init-sysctl
        image: harbor.freedom.org/docker.io/busybox:1.31.1
        command:
        - sysctl
        - -w
        - vm.max_map_count=262144
        securityContext:
          privileged: true
      containers:
      - name: elasticsearch-client
        image: harbor.freedom.org/elastic/elasticsearch:7.9.2
        env:
          - name: "ES_JAVA_OPTS"
            value: "-Xms512m -Xmx512m"
          - name: "cluster.name"
            value: "production-infra-elasticsearch"
          - name: "discovery.seed_hosts"
            value: "elasticsearch-master"
          - name: "cluster.initial_master_nodes"
            value: "elasticsearch-master"
          - name: "node.master"
            value: "false"
          - name: "node.data"
            value: "false"
          - name: "node.ingest"
            value: "false"
          - name: "node.remote_cluster_client"  # 各个角色介绍：https://www.elastic.co/guide/en/elasticsearch/reference/current/modules-node.html
            value: "true"
        resources:
          limits:
            cpu: 1
        ports:
          - name: http
            containerPort: 9200
        volumeMounts:
        - name: storage
          mountPath: /data
      volumes:
          - emptyDir:
              medium: ""
            name: storage
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: elasticsearch-master
  namespace: production-infra
  labels:
    app: elasticsearch-master


---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: elasticsearch-master
  namespace: production-infra
  labels:
    app: elasticsearch-master
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: elasticsearch-master
subjects:
  - kind: ServiceAccount
    name: elasticsearch-master
    namespace: production-infra


---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch-master
  namespace: production-infra
  labels:
    component: elasticsearch
    role: master
spec:
  replicas: 3
  selector:
    matchLabels:
      component: elasticsearch
      role: master
  template:
    metadata:
      labels:
        component: elasticsearch
        role: master
    spec:
      initContainers:
        - name: init-sysctl
          image: harbor.freedom.org/docker.io/busybox:1.31.1
          command:
            - sysctl
            - -w
            - vm.max_map_count=262144
          securityContext:
            privileged: true
      containers:
        - name: elasticsearch-master
          image: harbor.freedom.org/elastic/elasticsearch:7.9.2
          imagePullPolicy: IfNotPresent
          env:
            - name: "cluster.name"
              value: "production-infr-elasticsearch"
            - name: "bootstrap.memory_lock"
              value: "true"
            - name: "discovery.seed_hosts"
              value: "elasticsearch-discovery"
            - name: "gateway.recover_after_nodes"
              value: "2"
            - name: "node.master"
              value: "true"
            - name: "node.data"
              value: "false"
            - name: "node.ingest"
              value: "false"
            - name: "ES_JAVA_OPTS"
              value: "-Xms512m -Xmx512m"
          resources:
            # need more cpu upon initialization, therefore burstable class
            limits:
              cpu: 1000m
              memory: 4096Mi
            requests:
              cpu: 100m
              memory: 1024Mi
          ports:
            - containerPort: 9200
              name: db
              protocol: TCP
            - containerPort: 9300
              name: transport
              protocol: TCP
          volumeMounts:
            - name: storage
              mountPath: /data
      volumes:
        - name: "storage"
          emptyDir:
            medium: ""


---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-discovery
  namespace: production-infra
  labels:
    component: elasticsearch
    role: master
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    component: elasticsearch
    role: master
  ports:
    - name: transport
      port: 9300
      protocol: TCP

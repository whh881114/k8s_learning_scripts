kind: Deployment
apiVersion: apps/v1
metadata:
  name: nfs-client-provisioner
  namespace: production-storage-class-nfs
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nfs-client-provisioner
  template:
    metadata:
      labels:
        app: nfs-client-provisioner
    spec:
      serviceAccountName: nfs-client-provisioner
      containers:
        - name: nfs-client-provisioner
          image: registry.freedom.org/quay.io/external_storage/nfs-client-provisioner:v3.1.0-k8s1.11
          volumeMounts:
            - name: nfs-client-root
              mountPath: /persistentvolumes
          env:
            - name: PROVISIONER_NAME
              value: fuseim.pri/ifs-production-storage-class-nfs
            - name: NFS_SERVER
              value: nfs.freedom.org
            - name: NFS_PATH
              value: /data01/k8s-nfs-pvc/production
      volumes:
        - name: nfs-client-root
          nfs:
            server: nfs.freedom.org
            path: /data01/k8s-nfs-pvc/production

apiVersion: apps/v1
kind: Deployment
metadata:
  name: lamp-api
  namespace: cicd
  labels:
    name: lamp-api
spec:
  replicas: 1
  selector:
    matchLabels:
      name: lamp-api
  template:
    metadata:
      labels:
        name: lamp-api
    spec:
      containers:
        - name: lamp-api
          image: registry.k8s.example.com:5000/roy/lamp-api:v1.0.0
          ports:
            - containerPort: 80
          command:
            - /usr/sbin/httpd
          args:
            - -D
            - FOREGROUND
          volumeMounts:
            - name: logs
              mountPath: /var/log/httpd
      volumes:
        - name: logs
          persistentVolumeClaim:
            claimName: lamp-api-logs
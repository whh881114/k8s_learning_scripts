apiVersion: extensions/v1beta1
kind: Ingress
metadata:
  name: lamp-ingress
  namespace: cicd
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
    - host: frd.lamp.example.com
      http:
        paths:
        - path: /
          backend:
            serviceName: lamp-frd
            servicePort: 80
    - host: api.lamp.example.com
      http:
        paths:
        - path: /
          backend:
            serviceName: lamp-api
            servicePort: 80
apiVersion: v1
kind: Service
metadata:
  name: nginx-ingress-controller
  namespace: ingress-nginx
  labels:
    name: nginx-ingress-controller
spec:
  type: NodePort
  clusterIP: 10.106.0.1
  ports:
    - name: http
      port: 80        # 服务访问端口
      targetPort: 80  # 容器端口
    - name: https
      port: 443        # 服务访问端口
      targetPort: 443  # 容器端口
  selector:
    app.kubernetes.io/name: ingress-nginx # 调用ingress-nginx名字空间下的nginx-ingress-controller容器。
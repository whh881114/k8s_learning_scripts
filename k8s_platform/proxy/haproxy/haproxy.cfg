global
    log         127.0.0.1 local2 info
    chroot      /var/lib/haproxy
    pidfile     /var/run/haproxy.pid
    maxconn     10000
    user        haproxy
    group       haproxy
    daemon
    stats socket /var/lib/haproxy/stats

defaults
    mode                    http
    log                     global
    option                  httplog
    option                  dontlognull
    option http-server-close
    option forwardfor       except 127.0.0.0/8
    option                  redispatch
    retries                 3
    timeout http-request    10s
    timeout queue           1m
    timeout connect         10s
    timeout client          1m
    timeout server          1m
    timeout http-keep-alive 10s
    timeout check           3s
    maxconn                 3000
    compression algo gzip
    compression type text/html text/plain text/css application/javascript application/json application/xml

listen status
    bind    0.0.0.0:5001
    mode    http
    log     global
    stats   refresh 30s
    stats   uri /stats
    stats   realm Private lands
    stats   auth roy:Iam007...
    stats   hide-version

# rancher管理控制台，TCP转发，用个正常点的端口8443。
listen rancher
    bind        *:443
    mode        tcp
    balance     source
    server      master.k8s.freedom.org master.k8s.freedom.org:30536 weight 1 maxconn 10000 check inter 10s
    server      worker01.k8s.freedom.org worker01.k8s.freedom.org:30536 weight 1 maxconn 10000 check inter 10s
    server      worker02.k8s.freedom.org worker02.k8s.freedom.org:30536 weight 1 maxconn 10000 check inter 10s
    server      worker03.k8s.freedom.org worker03.k8s.freedom.org:30536 weight 1 maxconn 10000 check inter 10s


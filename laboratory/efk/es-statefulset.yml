# Elasticsearch deployment itself
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch-logging
  namespace: kube-system
  labels:
    k8s-app: elasticsearch-logging
    version: 7.5.2
    kubernetes.io/cluster-service: "true"
    addonmanager.kubernetes.io/mode: Reconcile
spec:
  serviceName: elasticsearch-logging
  replicas: 3
  selector:
    matchLabels:
      k8s-app: elasticsearch-logging
      version: 7.5.2
  template:
    metadata:
      labels:
        k8s-app: elasticsearch-logging
        version: 7.5.2
        kubernetes.io/cluster-service: "true"
    spec:
      serviceAccountName: elasticsearch-logging
      # Elasticsearch requires vm.max_map_count to be at least 262144.
      # If your OS already sets up this number to a higher value, feel free
      # to remove this init container.
      initContainers:
        - name: elasticsearch-logging-init
          image: registry.k8s.example.com:5000/busybox:1.31.1
          command: ["sysctl"]
          args: ["-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true
      containers:
        - image: registry.k8s.example.com:5000/elastic/elasticsearch:7.5.2
          name: elasticsearch-logging
          resources:
            # need more cpu upon initialization, therefore burstable class
            limits:
              cpu: 1000m
              memory: 4096Mi
            requests:
              cpu: 100m
              memory: 1024Mi
          ports:
            - containerPort: 9200
              name: db
              protocol: TCP
            - containerPort: 9300
              name: transport
              protocol: TCP
          volumeMounts:
            - name: elasticsearch-logging
              mountPath: /data
          env:
            - name: "NAMESPACE"
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            #OOM option 根据自身机器配置修改值
            - name: ES_JAVA_OPTS
              value: -Xms2048m -Xmx2048m
  volumeClaimTemplates:
    - metadata:
        name: elasticsearch-logging
        annotations:
          volume.beta.kubernetes.io/storage-class: laboratory-nfs-storage
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 10Gi
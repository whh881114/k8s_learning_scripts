global
    log         127.0.0.1 local2 info
    chroot      /var/lib/haproxy
    pidfile     /var/run/haproxy.pid
    maxconn     10000
    user        haproxy
    group       haproxy
    daemon
    stats socket /var/lib/haproxy/stats

defaults
    mode                    http
    log                     global
    option                  httplog
    option                  dontlognull
    option http-server-close
    option forwardfor       except 127.0.0.0/8
    option                  redispatch
    retries                 3
    timeout http-request    10s
    timeout queue           1m
    timeout connect         10s
    timeout client          1m
    timeout server          1m
    timeout http-keep-alive 10s
    timeout check           3s
    maxconn                 3000
    compression algo gzip
    compression type text/html text/plain text/css application/javascript application/json application/xml

listen status
    bind    0.0.0.0:5001
    mode    http
    log     global
    stats   refresh 30s
    stats   uri /stats
    stats   realm Private lands
    stats   auth roy:I'am007...
    stats   hide-version

# laboratory示例开始处 20200208, 端口从40000开始。
listen laboratory-redis
    bind        *:40000
    mode        tcp
    balance     source
    server      redis.k8s.example.com 10.97.72.56:6379 weight 1 maxconn 10000 check inter 10s

listen laboratory-mysql
    bind        *:40001
    mode        tcp
    balance     source
    server      mysql.k8s.example.com 10.106.220.79:3306 weight 1 maxconn 10000 check inter 10s
# laboratory示例结束处

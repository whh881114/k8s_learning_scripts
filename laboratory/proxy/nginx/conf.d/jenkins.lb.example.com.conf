upstream jenkins {
    server 10.99.167.214:8080;
}

server {
    listen       80;
    listen       [::]:80;
    server_name  jenkins.lb.example.com;
    root         /usr/share/nginx/html;

    access_log  /var/log/nginx/jenkins.lb.example.com.access.log  proxy;
    error_log  /var/log/nginx/jenkins.lb.example.com.access.err;

    location / {
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_pass   http://jenkins;
    }

    error_page 404 /404.html;
        location = /40x.html {
    }

    error_page 500 502 503 504 /50x.html;
        location = /50x.html {
    }
}

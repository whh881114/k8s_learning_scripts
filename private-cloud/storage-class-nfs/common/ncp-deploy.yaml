kind: Deployment
apiVersion: apps/v1
metadata:
  name: nfs-client-provisioner-public-infra
  namespace: nfs-client-provisioner-public-infra
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nfs-client-provisioner-public-infra
  template:
    metadata:
      labels:
        app: nfs-client-provisioner-public-infra
    spec:
      serviceAccountName: nfs-client-provisioner-public-infra
      containers:
        - name: nfs-client-provisioner-public-infra
          image: quay.io/external_storage/nfs-client-provisioner:v3.1.0-k8s1.11
          volumeMounts:
            - name: nfs-client-root
              mountPath: /persistentvolumes
          env:
            - name: PROVISIONER_NAME
              value: fuseim.pri/ifs-nfs-client-provisioner-public-infra
            - name: NFS_SERVER
              value: worker01.k8s.freedom.org
            - name: NFS_PATH
              value: /data/k8s-nfs-pvc/public-infra
      volumes:
        - name: nfs-client-root
          nfs:
            server: worker01.k8s.freedom.org
            path: /data/k8s-nfs-pvc/public-infra

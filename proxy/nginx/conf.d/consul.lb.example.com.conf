upstream consul {
    server 10.103.200.68:8500;
}

server {
    listen       80;
    listen       [::]:80;
    server_name  consul.lb.example.com;
    root         /usr/share/nginx/html;

    access_log  /var/log/nginx/consul.lb.example.com.access.log  main;
    error_log  /var/log/nginx/consul.lb.example.com.access.err;

    location / {
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_pass   http://consul;
    }

    error_page 404 /404.html;
        location = /40x.html {
    }

    error_page 500 502 503 504 /50x.html;
        location = /50x.html {
    }
}

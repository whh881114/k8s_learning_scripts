---
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster
  namespace: public-infra
spec:
  type: ClusterIP
  clusterIP: 10.109.45.70
  ports:
    - port: 6379
      targetPort: 6379
      name: client
    - port: 16379
      targetPort: 16379
      name: gossip
  selector:
    app: redis-cluster
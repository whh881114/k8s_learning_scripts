apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-zabbix-mysql
  namespace: public-infra
  labels:
    name: data-zabbix-mysql
  annotations:
    volume.beta.kubernetes.io/storage-class: nfs-storage-public-infra
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: logs-zabbix-mysql
  namespace: public-infra
  labels:
    name: logs-zabbix-mysql
  annotations:
    volume.beta.kubernetes.io/storage-class: nfs-storage-public-infra
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
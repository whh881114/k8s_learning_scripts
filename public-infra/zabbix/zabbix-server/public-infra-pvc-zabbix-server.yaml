apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alertscripts-zabbix-server
  namespace: public-infra
  labels:
    name: alertscripts-zabbix-server
  annotations:
    volume.beta.kubernetes.io/storage-class: nfs-storage-public-infra
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi


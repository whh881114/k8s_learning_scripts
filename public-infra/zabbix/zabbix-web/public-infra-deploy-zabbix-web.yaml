apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-web
  namespace: zabbix
  labels:
    name: zabbix-web
spec:
  replicas: 1
  selector:
    matchLabels:
      name: zabbix-web
  template:
    metadata:
      labels:
        name: zabbix-web
    spec:
      containers:
        - name: zabbix-web
          image: registry.example.com/docker.io/zabbix/zabbix-web-apache-mysql:centos-4.0.17
          ports:
            - containerPort: 80
          env:
            - name: ZBX_SERVER_NAME
              valueFrom:
                configMapKeyRef:
                  name: vars-zabbix-web
                  key: ZBX_SERVER_NAME
            - name: ZBX_SERVER_HOST
              valueFrom:
                configMapKeyRef:
                  name: vars-zabbix-web
                  key: ZBX_SERVER_HOST
            - name: ZBX_SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: vars-zabbix-web
                  key: ZBX_SERVER_PORT
            - name: DB_SERVER_HOST
              valueFrom:
                configMapKeyRef:
                  name: vars-zabbix-web
                  key: ZBX_DB_SERVER_HOST
            - name: DB_SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: vars-zabbix-web
                  key: ZBX_DB_SERVER_PORT
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: vars-zabbix-web
                  key: ZBX_MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: vars-zabbix-web
                  key: ZBX_MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: vars-zabbix-web
                  key: ZBX_MYSQL_PASSWORD
            - name: PHP_TZ
              valueFrom:
                configMapKeyRef:
                  name: vars-zabbix-web
                  key: ZBX_PHP_TZ
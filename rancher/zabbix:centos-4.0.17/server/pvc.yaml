apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zabbix-server-alertscripts
  namespace: production-zabbix
  labels:
    name: zabbix-server-alertscripts
  annotations:
    volume.beta.kubernetes.io/storage-class: nfs-client-provisioner-public-infra
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi


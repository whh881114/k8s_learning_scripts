apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lamp-mysql-data
  namespace: cicd
  labels:
    name: mysql-data
  annotations:
    volume.beta.kubernetes.io/storage-class: "cicd-nfs-storage"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lamp-mysql-logs
  namespace: cicd
  labels:
    name: mysql-logs
  annotations:
    volume.beta.kubernetes.io/storage-class: "cicd-nfs-storage"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi